{% raw %}
<template id="variable-template">
  <div id="variable-temp-{{ id }}" class="container-fluid mt-3">
    <div>
      <strong class="fs-5 mb-3"> Properties </strong>
      <button
        name="{{ id }}"
        class="delete_variable btn btn-sm btn-danger"
        data-bs-toggle="confirmation"
        data-btn-ok-label="Yes"
        data-btn-ok-class="btn-success"
        data-btn-cancel-label="Nooo Stoooop!"
        data-btn-cancel-class="btn-danger"
        data-title="Sure?"
        data-content="Delete this variable?"
        title="Delete me"
      >
        Delete
      </button>
    </div>
    <div class="variable-block">
      <div class="input-group my-2">
        <span class="input-group-text" id="variable-name" data-id="{{ id }}">Name</span>
        <input type="text" class="form-control" aria-describedby="variable-name" value="{{ name }}" />
      </div>
      <div class="input-group mb-2">
        <span class="input-group-text" id="variable-type" data-id="{{ id }}">Type</span>
        <input type="text" class="form-control variable-type" aria-describedby="variable-type" value="{{ type }}" />
      </div>
      <div class="input-group mb-2 variable-value-group d-none">
        <span class="input-group-text" id="variable-value" data-id="{{ id }}">Value</span>
        <input type="text" class="form-control variable-value" aria-describedby="variable-value" value="{{ const_val }}" />
      </div>
    </div>
  </div>
  <div class="container-fluid my-3">
    <strong class="fs-5 mb-2"> Constraints </strong>
    <button type="button" class="btn btn-success btn-sm p-1">+ Add</button>
  </div>
  <div class="container-fluid my-3 d-none enumerators-container">
    <strong class="fs-5 mb-2"> Enumerators </strong>
    <button type="button" class="btn btn-success btn-sm p-1 add-enumerator-btn">+ Add</button>
    <div class="container-fluid enumerators-list" id="enumerators-{{ id }}"></div>
  </div>
</template>
{% endraw %}
