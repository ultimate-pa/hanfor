{% extends "layout.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <ul id="tab-list" class="nav nav-tabs card-header-tabs" role="tablist">
            {% for name, page in tabs %}
            <li class="nav-item" role="presentation">
                <button
                    class="nav-link {% if loop.first %}active{% endif %}"
                    id="tab-{{ loop.index0 }}-btn"
                    data-bs-toggle="tab"
                    data-bs-target="#tab-{{ loop.index0 }}"
                    type="button"
                    role="tab"
                    aria-controls="tab-{{ loop.index0 }}"
                    aria-selected="{{ 'true' if loop.first else 'false' }}"
                >{{ name }}</button>
            </li>
            {% endfor %}
        </ul>
    </div>
    <div class="card-body">
        <div id="tab-content" class="tab-content">
            {% for name, page in tabs %}
            <div
                class="tab-pane fade {% if loop.first %}show active{% endif %}"
                id="tab-{{ loop.index0 }}"
                role="tabpanel"
                aria-labelledby="tab-{{ loop.index0 }}-btn"
            >
                {% include page %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
{% for js_file in BUNDLE_JS %}
    <script type="text/javascript" src="{{ url_for("static", filename=js_file) }}"></script>
{% endfor %}
{% endblock %}
