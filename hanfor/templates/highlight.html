<b class="highlighted-variable" data-main-var="{{ main_var }}" data-score="{{ main_score }}" title="{{ main_var }} [{{ main_score }}]" style="background-color: #FBACC1; border-radius: 3px; padding: 1px 4px;">{{ text }}</b>{% for var, score in extra_vars %}<sup class="highlighted-variable-extra" data-var="{{ var }}" data-score="{{ score }}" title="{{ var }} [{{ score }}]" style="background-color: #FBACC1; font-size: 0.7em; margin-left: 1px; cursor: help;"><b>{{ loop.index }}</b></sup>{% endfor %}
